name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Build the Docker Image using Buildx (supports multiple architectures)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ezdussin/whatsapp-automation-backend:latest
          # This ensures it works on your Contabo VPS (AMD64)
          platforms: linux/amd64

      # 2. Set up Kubectl and Context
      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Prepare Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # 3. Deploy to k3s using direct kubectl
      - name: Deploy to k3s
        run: |
          # Write the secret using a method that preserves newlines
          cat <<EOF > k3s_config.yaml
          ${{ secrets.KUBE_CONFIG }}
          EOF
          
          # Force the use of this file AND force the server IP just in case
          kubectl --kubeconfig=k3s_config.yaml --server=https://213.136.92.71:6443 --insecure-skip-tls-verify=true apply -f k8s/deployment.yaml --namespace whatsapp-system
          kubectl --kubeconfig=k3s_config.yaml --server=https://213.136.92.71:6443 --insecure-skip-tls-verify=true apply -f k8s/network.yaml --namespace whatsapp-system
          
          # Restart to pull the 'latest' image
          kubectl --kubeconfig=k3s_config.yaml --server=https://213.136.92.71:6443 --insecure-skip-tls-verify=true rollout restart deployment whatsapp-automation-backend -n whatsapp-system